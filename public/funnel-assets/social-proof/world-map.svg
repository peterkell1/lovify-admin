<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="World map placeholder">
  <rect width="800" height="500" fill="#f6ead6"/>
  <!-- Highly abstract world map: dotted continents -->
  <g fill="#3b2f24" opacity="0.55">
    <!-- North America -->
    <circle cx="180" cy="180" r="6"/><circle cx="200" cy="170" r="6"/><circle cx="220" cy="190" r="6"/>
    <circle cx="160" cy="210" r="6"/><circle cx="190" cy="220" r="6"/><circle cx="210" cy="240" r="6"/>
    <!-- South America -->
    <circle cx="240" cy="320" r="6"/><circle cx="260" cy="350" r="6"/><circle cx="250" cy="380" r="6"/>
    <!-- Europe -->
    <circle cx="400" cy="170" r="6"/><circle cx="420" cy="180" r="6"/><circle cx="410" cy="200" r="6"/>
    <!-- Africa -->
    <circle cx="430" cy="280" r="6"/><circle cx="440" cy="310" r="6"/><circle cx="450" cy="340" r="6"/>
    <circle cx="425" cy="370" r="6"/>
    <!-- Asia -->
    <circle cx="540" cy="180" r="6"/><circle cx="570" cy="200" r="6"/><circle cx="600" cy="220" r="6"/>
    <circle cx="620" cy="180" r="6"/><circle cx="650" cy="210" r="6"/>
    <!-- Australia -->
    <circle cx="660" cy="370" r="6"/><circle cx="680" cy="380" r="6"/>
  </g>
  <!-- Pin markers -->
  <g fill="#2a221b">
    <circle cx="200" cy="190" r="14"/><circle cx="200" cy="190" r="6" fill="#fbf2e0"/>
    <circle cx="430" cy="300" r="14"/><circle cx="430" cy="300" r="6" fill="#fbf2e0"/>
    <circle cx="600" cy="200" r="14"/><circle cx="600" cy="200" r="6" fill="#fbf2e0"/>
    <circle cx="260" cy="350" r="14"/><circle cx="260" cy="350" r="6" fill="#fbf2e0"/>
    <circle cx="660" cy="370" r="14"/><circle cx="660" cy="370" r="6" fill="#fbf2e0"/>
  </g>
</svg>
